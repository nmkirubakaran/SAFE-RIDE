<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RYDEX — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo">RYD<span>EX</span></div>
      <p class="tagline">Smart Ride Safety Platform</p>
    </div>
    <div class="tab-row">
      <button class="tab active" id="tab-login"    onclick="showTab('login')">Login</button>
      <button class="tab"        id="tab-register" onclick="showTab('register')">Register</button>
    </div>
    <div id="form-login">
      <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@email.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="handleLogin()">Login</button>
    </div>
    <div id="form-register" style="display:none">
      <div class="field"><label>Full name</label><input type="text" id="reg-name" placeholder="Your name" /></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@email.com" /></div>
      <div class="field"><label>Password</label><input type="password" id="reg-password" placeholder="Min 6 characters" /></div>
      <button class="btn-primary" onclick="handleRegister()">Create account</button>
    </div>
    <p id="auth-msg" class="msg"></p>
  </div>
  <script type="module">
    import { loginUser, registerUser, onAuthChange } from "./supabase.js";
    onAuthChange(user => { if (user) window.location.href = "dashboard.html"; });
    window.showTab = (tab) => {
      document.getElementById("form-login").style.display    = tab === "login"    ? "block" : "none";
      document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
      document.getElementById("tab-login").classList.toggle("active",    tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
    };
    window.handleLogin = async () => {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const msg = document.getElementById("auth-msg");
      try { msg.textContent = "Logging in..."; msg.className = "msg"; await loginUser(email, password); }
      catch (e) { msg.textContent = "Login failed: " + e.message; msg.className = "msg error"; }
    };
    window.handleRegister = async () => {
      const name = document.getElementById("reg-name").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const password = document.getElementById("reg-password").value;
      const msg = document.getElementById("auth-msg");
      try { msg.textContent = "Creating account..."; msg.className = "msg"; await registerUser(email, password, name); msg.textContent = "Account created! Check your email to confirm, then login."; msg.className = "msg success"; }
      catch (e) { msg.textContent = "Registration failed: " + e.message; msg.className = "msg error"; }
    };
  </script>
</body>
</html>
